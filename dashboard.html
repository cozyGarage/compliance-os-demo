<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — ComplianceOS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { 600:'#234880', 700:'#1A3156', 800:'#112240', 900:'#0B1A2B' },
            accent: { 100:'#D1FAE5', 400:'#34D399', 500:'#10B981', 600:'#059669' }
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/custom.css">
  <style>
    .sidebar-width { width: 260px; }
    @media (max-width: 1024px) {
      .sidebar-width { position: fixed; z-index: 40; height: 100vh; }
    }
  </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans" id="dashboard-app">

  <!-- Notifications Overlay + Panel -->
  <div id="notif-overlay" class="notif-overlay"></div>
  <aside id="notif-panel" class="notif-panel">
    <div class="flex items-center justify-between px-5 py-4 border-b border-slate-200">
      <div class="flex items-center gap-2">
        <h2 class="font-semibold text-slate-800" id="notif-panel-title">Notifications</h2>
        <span id="notif-unread-count" class="text-xs font-bold bg-red-500 text-white px-1.5 py-0.5 rounded-full hidden"></span>
      </div>
      <div class="flex items-center gap-2">
        <button id="notif-mark-read" class="text-xs text-emerald-600 hover:text-emerald-700 font-medium" style="display:none"></button>
        <button id="notif-close" class="p-1.5 rounded-lg hover:bg-slate-100 text-slate-500">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
    </div>
    <div id="notif-list" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
  </aside>

  <!-- Mobile Sidebar Overlay -->
  <div id="sidebar-overlay" class="hidden fixed inset-0 bg-black/50 z-30 lg:hidden"></div>

  <div class="flex h-screen overflow-hidden">

    <!-- ═══ Sidebar ═══ -->
    <aside id="sidebar" class="sidebar-width bg-[#0B1A2B] flex flex-col shrink-0 -translate-x-full lg:translate-x-0 transition-transform custom-scrollbar overflow-y-auto">
      <!-- Logo -->
      <div class="px-6 py-5 border-b border-white/10">
        <a href="index.html" class="flex items-center gap-2">
          <svg class="w-7 h-7 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
          </svg>
          <span class="text-white font-bold text-lg">Compliance<span class="text-emerald-500">OS</span></span>
        </a>
      </div>

      <!-- Nav -->
      <nav class="flex-1 px-4 py-6 space-y-1">
        <p id="sb-label-main" class="text-xs font-semibold text-slate-500 uppercase tracking-wider px-3 mb-3"></p>

        <a href="dashboard.html" class="sidebar-link active flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-emerald-400 bg-emerald-500/10 border-l-2 border-emerald-500" id="sb-dashboard">
          <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
          <span></span>
        </a>
        <a href="features.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-400 hover:text-white border-l-2 border-transparent transition" id="sb-frameworks">
          <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
          <span></span>
        </a>
        <a href="data-sources.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-400 hover:text-white border-l-2 border-transparent transition" id="sb-data-sources">
          <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"/></svg>
          <span></span>
          <span id="sb-ds-badge" class="ml-auto text-xs bg-amber-500/20 text-amber-400 px-1.5 py-0.5 rounded">1</span>
        </a>
        <a href="reports.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-400 hover:text-white border-l-2 border-transparent transition" id="sb-reports">
          <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          <span></span>
        </a>
        <a href="assessments.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-400 hover:text-white border-l-2 border-transparent transition" id="sb-assessments">
          <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
          <span></span>
        </a>

        <p id="sb-label-frameworks" class="text-xs font-semibold text-slate-500 uppercase tracking-wider px-3 mb-3 mt-6 pt-4 border-t border-white/10"></p>

        <div id="sb-framework-links"></div>

        <div class="pt-4 border-t border-white/10 mt-4">
          <a href="settings.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-400 hover:text-white border-l-2 border-transparent transition" id="sb-settings">
            <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            <span></span>
          </a>
        </div>
      </nav>

      <!-- User -->
      <div class="px-4 py-4 border-t border-white/10">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-full bg-gradient-to-br from-emerald-500 to-emerald-700 flex items-center justify-center text-sm font-bold text-white shrink-0">D</div>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium text-white truncate">Demo User</p>
            <p class="text-xs text-slate-500 truncate">demo@company.eu</p>
          </div>
          <a href="index.html" title="Back to site">
            <svg class="w-4 h-4 text-slate-500 hover:text-white transition" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
          </a>
        </div>
      </div>
    </aside>

    <!-- ═══ Main Content ═══ -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">

      <!-- Top Bar -->
      <header class="bg-white border-b border-slate-200 px-4 sm:px-6 py-4 flex items-center justify-between shrink-0">
        <div class="flex items-center gap-4">
          <button id="sidebar-toggle" class="lg:hidden p-2 rounded-lg hover:bg-slate-100 transition">
            <svg class="w-5 h-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
          <div>
            <h1 id="db-page-title" class="text-lg font-bold text-slate-800"></h1>
            <p id="db-last-updated" class="text-xs text-slate-500"></p>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <!-- Search -->
          <div class="hidden sm:flex items-center gap-2 px-3 py-2 bg-slate-100 rounded-lg">
            <svg class="w-4 h-4 text-slate-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input type="text" id="db-search-input" class="bg-transparent text-sm text-slate-600 placeholder-slate-400 outline-none w-36">
          </div>

          <!-- Theme Toggle -->
          <button id="dashboard-theme-toggle" class="theme-toggle-btn" aria-label="Toggle theme">
            <!-- Sun (shown when dark) -->
            <svg id="db-sun-icon" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
            <!-- Moon (shown when light) -->
            <svg id="db-moon-icon" class="w-5 h-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
          </button>

          <!-- Language selector (compact for dashboard) -->
          <div class="hidden sm:flex items-center gap-0.5 bg-slate-100 rounded-lg p-1">
            <button class="lang-btn" onclick="setLocale('en')">EN</button>
            <button class="lang-btn" onclick="setLocale('de')">DE</button>
            <button class="lang-btn" onclick="setLocale('fr')">FR</button>
          </div>

          <!-- Notifications Bell -->
          <button id="notif-btn" class="relative p-2 rounded-lg hover:bg-slate-100 transition">
            <svg class="w-5 h-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
            <span id="notif-dot" class="hidden absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full"></span>
          </button>

          <!-- Upgrade -->
          <a href="signup.html" class="hidden sm:flex items-center gap-1 px-3 py-2 bg-emerald-500 hover:bg-emerald-600 text-white text-sm font-medium rounded-lg transition" id="db-upgrade-btn">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>
            <span id="db-upgrade-label"></span>
          </a>
        </div>
      </header>

      <!-- Scrollable Content -->
      <main class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-6 custom-scrollbar">

        <!-- ── Row 1: Stat Cards ── -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
          <!-- Compliance Score -->
          <div class="bg-white rounded-xl p-5 border border-slate-200 col-span-2 sm:col-span-1">
            <p id="stat-label-score" class="text-xs font-medium text-slate-500 mb-3"></p>
            <div class="flex items-center gap-4">
              <div id="score-ring" class="circular-progress w-16 h-16 shrink-0">
                <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center">
                  <span id="stat-score" class="text-sm font-bold text-slate-800"></span>
                </div>
              </div>
              <div>
                <p id="stat-score-label" class="text-2xl font-bold text-slate-800"></p>
                <p id="stat-score-trend" class="text-xs text-emerald-600"></p>
              </div>
            </div>
          </div>

          <!-- Active Frameworks -->
          <div class="bg-white rounded-xl p-5 border border-slate-200">
            <p id="stat-label-fw" class="text-xs font-medium text-slate-500 mb-3"></p>
            <p id="stat-fw-count" class="text-3xl font-bold text-slate-800"></p>
            <div id="stat-fw-badges" class="flex flex-wrap gap-1 mt-3"></div>
          </div>

          <!-- Open Tasks -->
          <div class="bg-white rounded-xl p-5 border border-slate-200">
            <p id="stat-label-tasks" class="text-xs font-medium text-slate-500 mb-3"></p>
            <p id="stat-tasks-count" class="text-3xl font-bold text-slate-800"></p>
            <p id="stat-tasks-overdue" class="text-xs text-amber-600 mt-1"></p>
            <div class="mt-3 h-1.5 bg-slate-100 rounded-full">
              <div id="stat-tasks-bar" class="h-1.5 bg-amber-400 rounded-full transition-all"></div>
            </div>
          </div>

          <!-- Reports Due -->
          <div class="bg-white rounded-xl p-5 border border-slate-200">
            <p id="stat-label-reports" class="text-xs font-medium text-slate-500 mb-3"></p>
            <p id="stat-reports-count" class="text-3xl font-bold text-red-500"></p>
            <p id="stat-reports-next" class="text-xs text-slate-500 mt-1"></p>
            <p id="stat-reports-due" class="text-xs text-red-500 mt-1 font-medium"></p>
          </div>
        </div>

        <!-- ── Row 2: Chart + Framework Status ── -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
          <!-- Compliance Trend Chart -->
          <div class="lg:col-span-2 bg-white rounded-xl p-6 border border-slate-200">
            <div class="flex items-center justify-between mb-6">
              <div>
                <h3 id="chart-trend-title" class="font-semibold text-slate-800"></h3>
                <p id="chart-trend-subtitle" class="text-xs text-slate-500"></p>
              </div>
              <div class="flex items-center gap-2">
                <div class="w-3 h-3 rounded-full bg-emerald-500"></div>
                <span id="chart-legend" class="text-xs text-slate-500"></span>
              </div>
            </div>
            <canvas id="trend-chart" class="w-full" style="height: 200px;"></canvas>
          </div>

          <!-- Framework Status -->
          <div class="bg-white rounded-xl p-6 border border-slate-200">
            <h3 id="chart-fw-status-title" class="font-semibold text-slate-800 mb-6"></h3>
            <div id="fw-status-list" class="space-y-5"></div>
            <div class="pt-4 border-t border-slate-100 mt-4">
              <p id="fw-available-label" class="text-xs text-slate-500 mb-3"></p>
              <div class="flex gap-2">
                <span class="text-xs bg-slate-100 text-slate-500 px-2 py-1 rounded">GDPR</span>
                <span class="text-xs bg-slate-100 text-slate-500 px-2 py-1 rounded">CSDD</span>
              </div>
            </div>
          </div>
        </div>

        <!-- ── Row 3: Activity + Tasks ── -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
          <!-- Recent Activity -->
          <div class="bg-white rounded-xl p-6 border border-slate-200">
            <h3 id="activity-title" class="font-semibold text-slate-800 mb-5"></h3>
            <div id="activity-list" class="space-y-4"></div>
          </div>

          <!-- Tasks Due -->
          <div class="bg-white rounded-xl p-6 border border-slate-200">
            <div class="flex items-center justify-between mb-4">
              <h3 id="tasks-title" class="font-semibold text-slate-800"></h3>
              <span id="tasks-count-badge" class="text-xs text-slate-500 bg-slate-100 px-2 py-1 rounded"></span>
            </div>
            <!-- Filter Bar -->
            <div id="tasks-filter-bar" class="flex flex-wrap gap-2 mb-4"></div>
            <div class="overflow-x-auto">
              <table class="w-full text-sm">
                <thead>
                  <tr id="tasks-thead" class="text-xs text-slate-500 border-b border-slate-100"></tr>
                </thead>
                <tbody id="tasks-tbody" class="divide-y divide-slate-50"></tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- ── Row 4: Emissions Overview ── -->
        <div class="bg-white rounded-xl p-6 border border-slate-200">
          <div class="flex items-center justify-between mb-6">
            <div>
              <h3 id="emissions-title" class="font-semibold text-slate-800"></h3>
              <p id="emissions-subtitle" class="text-xs text-slate-500"></p>
            </div>
            <span class="text-xs bg-emerald-100 text-emerald-700 px-2 py-1 rounded font-medium">CSRD ESRS E1</span>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-3 gap-8">
            <div class="text-center">
              <canvas id="donut-scope1" class="mx-auto mb-3"></canvas>
              <p id="emissions-scope1-label" class="font-semibold text-slate-800"></p>
              <p id="emissions-scope1-value" class="text-2xl font-bold text-emerald-600 mt-1"></p>
              <p id="emissions-scope1-sub" class="text-xs text-slate-500"></p>
            </div>
            <div class="text-center">
              <canvas id="donut-scope2" class="mx-auto mb-3"></canvas>
              <p id="emissions-scope2-label" class="font-semibold text-slate-800"></p>
              <p id="emissions-scope2-value" class="text-2xl font-bold text-blue-600 mt-1"></p>
              <p id="emissions-scope2-sub" class="text-xs text-slate-500"></p>
            </div>
            <div class="text-center">
              <canvas id="donut-scope3" class="mx-auto mb-3"></canvas>
              <p id="emissions-scope3-label" class="font-semibold text-slate-800"></p>
              <p id="emissions-scope3-value" class="text-2xl font-bold text-amber-600 mt-1"></p>
              <p id="emissions-scope3-sub" class="text-xs text-slate-500"></p>
            </div>
          </div>
          <div class="mt-6 pt-6 border-t border-slate-100 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
            <div>
              <p id="emissions-total-label" class="text-sm text-slate-500"></p>
              <p id="emissions-total-value" class="text-3xl font-bold text-slate-800"></p>
            </div>
            <div id="emissions-change" class="flex items-center gap-2"></div>
          </div>
        </div>

        <!-- ── Row 5: Data Sources ── -->
        <div class="bg-white rounded-xl p-6 border border-slate-200">
          <div class="flex items-center justify-between mb-6">
            <h3 id="ds-title" class="font-semibold text-slate-800"></h3>
            <button id="ds-add-btn" class="text-sm text-emerald-600 hover:text-emerald-700 font-medium"></button>
          </div>
          <div id="ds-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4"></div>
        </div>

      </main>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
